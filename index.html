<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mob Mart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="stage">
    <canvas id="scene" width="1280" height="720"></canvas>

    <!-- DOM overlay: HUD + shop panels sit on top of the canvas diorama -->
    <div id="hud" class="hud"></div>
    <button id="reset-btn" class="reset-btn" title="Reset all progress">Reset</button>
    <div id="shop-ui" class="shop-ui"></div>
    <div id="nav" class="nav"></div>

    <!-- Bob's hire arc: persistent goal chip over the empty counter until the first merchant is
         hired. Label (incl. the live hire cost) is filled by panels.js from the worker registry;
         click routes to the Workers tab. Sits under the title overlay, so it only shows in-shop. -->
    <button id="hire-goal-chip" class="hire-goal-chip hidden"></button>

    <!-- Bob's license-alert bubble (UX roadmap 3, DOM variant — Daniel's clickable pick): filled
         and toggled by panels.js from state.bobSpeech; game.js owns the queue/durations. Bob is
         stationary, so its position is a fixed CSS coordinate over his measured head. Click
         routes to the named license on the shelf (Shop tab + its category). -->
    <button id="bob-bubble" class="bob-bubble hidden"></button>

    <!-- Greg's restock bubble (Daniel's Option 1, 2026-07-04 — replaces the standing restock
         chip): out-of-stock news is GREG'S line of work, so it appears as his clickable speech
         bubble, hire-gated. Pre-hire, out-of-stock guidance falls back to the starved-attention
         trail (card/tab/nav pulses), which predates the chip. Filled/toggled by panels.js. -->
    <button id="greg-bubble" class="greg-bubble hidden"></button>

    <!-- Minimal title screen (dismissed on Open Shop) -->
    <div id="title" class="title-overlay">
      <h1 class="title-logo">MOB MART</h1>
      <p class="title-tag">Gear up the little guys. Watch them lose. Get paid.</p>
      <button id="open-shop-btn" class="open-shop-btn">Open Shop</button>
    </div>

    <!-- "While you were away" modal (M5) — shown over the title on return when Bob earned something -->
    <div id="offline-modal" class="offline-overlay hidden">
      <div class="offline-card">
        <h2 class="offline-title">While you were away&hellip;</h2>
        <p class="offline-body">Bob kept the shop open for <b id="offline-away">&mdash;</b> and sold
          <b id="offline-sales">0</b> items.</p>
        <div class="offline-gains">
          <span class="offline-gain gold">&#9670; +<span id="offline-gold">0</span></span>
          <span class="offline-gain rep">&#9819; +<span id="offline-rep">0</span></span>
        </div>
        <button id="offline-collect-btn" class="offline-collect-btn">Collect</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
